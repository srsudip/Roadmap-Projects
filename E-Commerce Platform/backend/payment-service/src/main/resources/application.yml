server:
  port: 8085

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://payment-db:5432/paymentdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

payment:
  stripe:
    secret-key: sk_test_placeholder
    publishable-key: pk_test_placeholder
  paypal:
    client-id: placeholder
    client-secret: placeholder

management:
  endpoints:
    web:
      exposure:
        include: health,info
