<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<body>
<div th:fragment="content" class="container">
    <h1 style="margin-bottom:1.5rem;">My Orders</h1>

    <div th:if="${orders == null or orders.isEmpty()}" style="text-align:center; padding:3rem; color:var(--text-light);">
        <p style="font-size:1.2rem;">No orders yet</p>
        <a th:href="@{/products}" class="btn btn-primary" style="margin-top:1rem;">Start Shopping</a>
    </div>

    <div th:unless="${orders == null or orders.isEmpty()}">
        <div class="card" th:each="order : ${orders}" style="margin-bottom:1rem;">
            <div class="card-body">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem;">
                    <div>
                        <strong>Order #</strong><span th:text="${order.id}">1</span>
                        <span style="color:var(--text-light); margin-left:1rem;"
                              th:text="${#strings.substring(order.createdAt, 0, 16)}">Date</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:0.75rem;">
                        <span class="badge"
                              th:classappend="'badge-' + ${order.status.toLowerCase()}"
                              th:text="${order.status}">PENDING</span>
                        <span style="font-weight:700;" th:text="'$' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}">$0.00</span>
                    </div>
                </div>

                <div th:if="${order.items}" style="margin-top:0.75rem; padding-top:0.75rem; border-top:1px solid var(--border); font-size:0.9rem; color:var(--text-light);">
                    <span th:each="item, iterStat : ${order.items}">
                        <span th:text="${item.productName}">Product</span>
                        <span th:text="' x' + ${item.quantity}">x1</span>
                        <span th:unless="${iterStat.last}">, </span>
                    </span>
                </div>

                <div style="margin-top:0.75rem;" th:if="${order.status == 'PENDING'}">
                    <form th:action="@{/orders/cancel/{orderId}(orderId=${order.id})}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-sm btn-danger"
                                onclick="return confirm('Cancel this order?')">Cancel Order</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
