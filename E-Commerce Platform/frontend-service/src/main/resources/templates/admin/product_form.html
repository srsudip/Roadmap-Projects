<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<body>
<div th:fragment="content" class="container">
    <a th:href="@{/admin}" style="color:var(--primary); text-decoration:none; font-size:0.9rem;">&larr; Back to dashboard</a>

    <div class="card" style="max-width:600px; margin:1.5rem auto 0;">
        <div class="card-header">Add New Product</div>
        <div class="card-body">
            <form th:action="@{/admin/products}" method="post">
                <div class="form-group">
                    <label for="name">Product Name</label>
                    <input type="text" id="name" name="name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" class="form-control" rows="3"></textarea>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <div class="form-group">
                        <label for="price">Price ($)</label>
                        <input type="number" id="price" name="price" class="form-control" step="0.01" min="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="stock">Stock</label>
                        <input type="number" id="stock" name="stock" class="form-control" min="0" value="0">
                    </div>
                </div>
                <div class="form-group">
                    <label for="categoryId">Category</label>
                    <select id="categoryId" name="categoryId" class="form-control">
                        <option value="">None</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">Category</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Create Product</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
