<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<body>
<div th:fragment="content" class="container">
    <div class="page-header">
        <h1>Checkout</h1>
        <p>Complete your order</p>
    </div>

    <div class="checkout-grid">
        <!-- Order Form -->
        <div>
            <div class="card">
                <div class="card-header">
                    <span style="display:flex; align-items:center; gap:0.5rem;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                        Shipping Address
                    </span>
                </div>
                <div class="card-body">
                    <form th:action="@{/checkout}" method="post">
                        <div class="form-group">
                            <label for="address">Full Address</label>
                            <input type="text" id="address" name="shippingAddress" class="form-control"
                                   placeholder="123 Main St, City, State, ZIP" required>
                        </div>
                        <div class="form-group">
                            <label for="paymentMethod">Payment Method</label>
                            <select id="paymentMethod" name="paymentMethod" class="form-control">
                                <option value="CREDIT_CARD">Credit Card</option>
                                <option value="DEBIT_CARD">Debit Card</option>
                                <option value="PAYPAL">PayPal</option>
                                <option value="STRIPE">Stripe</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success btn-lg btn-block" style="margin-top:0.5rem;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                            Place Order
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Order Summary -->
        <div>
            <div class="card" style="position:sticky; top:80px;">
                <div class="card-header">Order Summary</div>
                <div class="card-body">
                    <div th:if="${cart != null and cart.items != null}">
                        <div th:each="item : ${cart.items}" style="display:flex; justify-content:space-between; align-items:center; padding:0.6rem 0; border-bottom:1px solid var(--border-light);">
                            <div style="flex:1; min-width:0;">
                                <div style="font-size:0.875rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" th:text="${item['productName']}">Product</div>
                                <div style="font-size:0.8rem; color:var(--text-muted);" th:text="'Qty: ' + ${item['quantity']}">Qty: 1</div>
                            </div>
                            <span style="font-weight:600; font-size:0.9rem;" th:text="'€' + ${#numbers.formatDecimal(item['price'] * item['quantity'], 1, 2)}">€0.00</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; font-weight:800; font-size:1.15rem; padding-top:1rem; margin-top:0.5rem; letter-spacing:-0.02em;">
                            <span>Total</span>
                            <span style="color:var(--primary);" th:text="'€' + ${#numbers.formatDecimal(cart['total'], 1, 2)}">€0.00</span>
                        </div>
                    </div>
                    <div th:unless="${cart != null and cart.items != null}" class="empty-state" style="padding:1.5rem;">
                        <p>Your cart is empty</p>
                    </div>
                </div>
            </div>
            <a th:href="@{/cart}" class="btn btn-outline btn-block" style="margin-top:1rem;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Back to Cart
            </a>
        </div>
    </div>
</div>
</body>
</html>
