<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<body>
<div th:fragment="content" class="container">
    <h1 style="margin-bottom:1.5rem;">Checkout</h1>

    <div class="checkout-grid">
        <!-- Order Form -->
        <div>
            <div class="card">
                <div class="card-header">Shipping Address</div>
                <div class="card-body">
                    <form th:action="@{/checkout}" method="post">
                        <div class="form-group">
                            <label for="address">Full Address</label>
                            <input type="text" id="address" name="shippingAddress" class="form-control"
                                   placeholder="123 Main St, City, State, ZIP" required>
                        </div>
                        <div class="form-group">
                            <label for="paymentMethod">Payment Method</label>
                            <select id="paymentMethod" name="paymentMethod" class="form-control">
                                <option value="CREDIT_CARD">Credit Card</option>
                                <option value="DEBIT_CARD">Debit Card</option>
                                <option value="PAYPAL">PayPal</option>
                                <option value="STRIPE">Stripe</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success btn-lg" style="width:100%; margin-top:1rem;">
                            Place Order
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Order Summary -->
        <div>
            <div class="card">
                <div class="card-header">Order Summary</div>
                <div class="card-body">
                    <div th:if="${cart != null and cart.items != null}">
                        <div th:each="item : ${cart.items}" style="display:flex; justify-content:space-between; padding:0.5rem 0; border-bottom:1px solid var(--border);">
                            <span th:text="${item.productName} + ' x' + ${item.quantity}">Product x1</span>
                            <span th:text="'€' + ${#numbers.formatDecimal(item.price * item.quantity, 1, 2)}">$0.00</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; font-weight:700; font-size:1.1rem; padding-top:1rem; margin-top:0.5rem;">
                            <span>Total</span>
                            <span th:text="'€' + ${#numbers.formatDecimal(cart.total, 1, 2)}">$0.00</span>
                        </div>
                    </div>
                    <div th:unless="${cart != null and cart.items != null}" style="text-align:center; color:var(--text-light); padding:1rem;">
                        Cart is empty
                    </div>
                </div>
            </div>
            <a th:href="@{/cart}" class="btn btn-outline" style="width:100%; margin-top:1rem;">Back to Cart</a>
        </div>
    </div>
</div>
</body>
</html>
