<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<body>
<div th:fragment="content" class="container">
    <h1 style="margin-bottom:1.5rem;">Admin Dashboard</h1>

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="value" th:text="${totalOrders}">0</div>
            <div class="label">Total Orders</div>
        </div>
        <div class="stat-card">
            <div class="value" th:text="'€' + ${totalRevenue}">$0</div>
            <div class="label">Revenue</div>
        </div>
        <div class="stat-card">
            <div class="value" th:text="${totalProducts}">0</div>
            <div class="label">Products</div>
        </div>
        <div class="stat-card">
            <div class="value" th:text="${totalUsers}">0</div>
            <div class="label">Users</div>
        </div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;" class="checkout-grid">
        <!-- Recent Orders -->
        <div class="card">
            <div class="card-header">Recent Orders</div>
            <div class="card-body" style="padding:0;">
                <table class="table">
                    <thead>
                        <tr><th>ID</th><th>Status</th><th>Total</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${recentOrders}">
                            <td th:text="'#' + ${order.id}">1</td>
                            <td><span class="badge"
                                      th:classappend="'badge-' + ${order.status.toLowerCase()}"
                                      th:text="${order.status}">PENDING</span></td>
                            <td th:text="'€' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}">$0.00</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Product Management -->
        <div class="card">
            <div class="card-header" style="display:flex; justify-content:space-between; align-items:center;">
                <span>Products</span>
                <a th:href="@{/admin/products/new}" class="btn btn-sm btn-primary">+ Add Product</a>
            </div>
            <div class="card-body" style="padding:0; max-height:400px; overflow-y:auto;">
                <table class="table">
                    <thead>
                        <tr><th>Name</th><th>Price</th><th>Stock</th><th></th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}">
                            <td th:text="${product.name}">Product</td>
                            <td th:text="'€' + ${#numbers.formatDecimal(product.price, 1, 2)}">$0.00</td>
                            <td th:text="${product.stock}">0</td>
                            <td>
                                <form th:action="@{/admin/products/delete/{id}(id=${product.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-sm btn-danger"
                                            onclick="return confirm('Delete this product?')">Delete</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
