<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<body>
<div th:fragment="content" class="container">
    <h1 style="margin-bottom:1.5rem;">Products</h1>

    <!-- Search -->
    <form class="search-bar" th:action="@{/products}" method="get">
        <input type="text" name="search" class="form-control" placeholder="Search products..." th:value="${search}">
        <button type="submit" class="btn btn-primary">Search</button>
        <a th:if="${search}" th:href="@{/products}" class="btn btn-secondary">Clear</a>
    </form>

    <!-- Categories -->
    <div class="category-filter" th:if="${categories != null and !categories.isEmpty()}">
        <a th:href="@{/products}" th:classappend="${selectedCategory == null} ? 'active' : ''">All</a>
        <a th:each="cat : ${categories}"
           th:href="@{/products(categoryId=${cat.id})}"
           th:text="${cat.name}"
           th:classappend="${selectedCategory != null and selectedCategory == cat.id} ? 'active' : ''"></a>
    </div>

    <!-- Products grid -->
    <div class="product-grid" th:if="${products != null and !products.isEmpty()}">
        <div class="product-card" th:each="product : ${products}">
            <div style="background:#f1f5f9; height:200px; display:flex; align-items:center; justify-content:center;">
                <img th:if="${product.imageUrl != null}" th:src="${product.imageUrl}" alt="Product">
                <span th:unless="${product.imageUrl != null}" style="font-size:3rem; color:#94a3b8;">&#128722;</span>
            </div>
            <div class="info">
                <a th:href="@{/products/{id}(id=${product.id})}" class="name" th:text="${product.name}">Product</a>
                <div class="category" th:text="'Category #' + ${product.categoryId}">Category</div>
                <div class="price" th:text="'€' + ${#numbers.formatDecimal(product.price, 1, 2)}">$0.00</div>
                <div th:classappend="${product.stock > 0} ? 'stock' : 'stock out'"
                     th:text="${product.stock > 0} ? ${product.stock} + ' in stock' : 'Out of stock'">In stock</div>
            </div>
        </div>
    </div>

    <div th:unless="${products != null and !products.isEmpty()}" style="text-align:center; padding:3rem; color:var(--text-light);">
        <p style="font-size:1.2rem;">No products found</p>
        <a th:href="@{/products}" class="btn btn-outline" style="margin-top:1rem;">Browse all products</a>
    </div>
</div>
</body>
</html>
