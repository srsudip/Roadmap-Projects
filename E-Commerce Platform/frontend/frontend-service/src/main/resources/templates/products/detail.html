<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<body>
<div th:fragment="content" class="container">
    <a th:href="@{/products}" style="color:var(--primary); text-decoration:none; font-size:0.875rem; font-weight:500; display:inline-flex; align-items:center; gap:0.35rem; margin-bottom:1.5rem;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to products
    </a>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:3rem; margin-top:0.5rem;" class="checkout-grid">
        <div>
            <div style="border-radius:var(--radius-lg); overflow:hidden; background:linear-gradient(135deg, #eef2ff, #e0e7ff);">
                <img th:if="${product['imageUrl'] != null}" th:src="${product['imageUrl']}" th:alt="${product['name']}"
                     style="width:100%; height:400px; object-fit:cover; display:block;">
                <div th:unless="${product['imageUrl'] != null}" style="height:400px; display:flex; align-items:center; justify-content:center;">
                    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.4"><rect x="2" y="2" width="20" height="20" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                </div>
            </div>
        </div>
        <div>
            <span style="display:inline-block; padding:4px 12px; background:var(--primary-50); color:var(--primary); border-radius:var(--radius-full); font-size:0.75rem; font-weight:600; text-transform:uppercase; letter-spacing:0.04em; margin-bottom:1rem;"
                  th:text="'Category #' + ${product['categoryId']}">Category</span>
            <h1 th:text="${product['name']}" style="font-size:1.75rem; font-weight:800; margin-bottom:0.75rem; letter-spacing:-0.02em; line-height:1.3;">Product Name</h1>
            <p th:text="${product['description']}" style="color:var(--text-secondary); margin-bottom:1.5rem; line-height:1.7; font-size:0.95rem;" th:if="${product['description']}">Description</p>

            <div style="font-size:2.25rem; font-weight:800; color:var(--primary); margin-bottom:0.75rem; letter-spacing:-0.03em;"
                 th:text="'€' + ${#numbers.formatDecimal(product['price'], 1, 2)}">€0.00</div>

            <div style="display:flex; align-items:center; gap:0.5rem; margin-bottom:2rem;">
                <span style="width:8px; height:8px; border-radius:50; display:inline-block;"
                      th:style="${product['stock'] > 0} ? 'background:#059669' : 'background:#dc2626'"></span>
                <span th:classappend="${product['stock'] > 0} ? 'stock-info in' : 'stock-info out'"
                      th:text="${product['stock'] > 0} ? ${product['stock']} + ' units in stock' : 'Currently out of stock'"
                      style="font-size:0.9rem; font-weight:500;"></span>
            </div>

            <form th:action="@{/products/add-to-cart/{id}(id=${product['id']})}" method="post"
                  th:if="${product['stock'] > 0}">
                <div style="display:flex; align-items:center; gap:1rem; margin-bottom:1.25rem;">
                    <label style="font-weight:600; font-size:0.875rem;">Quantity</label>
                    <input type="number" name="quantity" value="1" min="1" th:max="${product['stock']}"
                           class="form-control" style="width:80px; text-align:center;">
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-block">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
                    Add to Cart
                </button>
            </form>

            <div th:unless="${product['stock'] > 0}" style="padding:1rem; background:var(--danger-light); border-radius:var(--radius); color:#991b1b; font-weight:500; text-align:center;">
                This product is currently out of stock
            </div>
        </div>
    </div>
</div>
</body>
</html>
