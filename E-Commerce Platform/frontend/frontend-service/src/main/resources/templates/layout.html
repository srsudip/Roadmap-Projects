<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' — ShopHub' : 'ShopHub — Premium E-Commerce'}">ShopHub — Premium E-Commerce</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%234f46e5'/><text x='16' y='22' font-size='18' text-anchor='middle' fill='white' font-family='system-ui' font-weight='bold'>S</text></svg>">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a th:href="@{/products}" class="navbar-brand">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="32" height="32" rx="8" fill="#4f46e5"/>
                <path d="M8 12L16 8L24 12V20L16 24L8 20V12Z" stroke="white" stroke-width="2" fill="none"/>
                <path d="M16 8V24" stroke="white" stroke-width="1.5" opacity="0.5"/>
                <path d="M8 12L24 20" stroke="white" stroke-width="1.5" opacity="0.3"/>
                <path d="M24 12L8 20" stroke="white" stroke-width="1.5" opacity="0.3"/>
                <circle cx="16" cy="16" r="3" fill="white" opacity="0.9"/>
            </svg>
            ShopHub
        </a>
        <ul class="navbar-nav">
            <li><a th:href="@{/products}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                <span class="nav-text"> Products</span>
            </a></li>
            <li th:if="${loggedIn}"><a th:href="@{/orders}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                <span class="nav-text"> My Orders</span>
            </a></li>
            <li th:if="${isAdmin}"><a th:href="@{/admin}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
                <span class="nav-text"> Admin</span>
            </a></li>
            <li th:if="${loggedIn}" class="cart-link"><a th:href="@{/cart}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
                <span class="nav-text"> Cart</span>
            </a></li>
            <li th:if="${!loggedIn}"><a th:href="@{/login}" class="btn-nav">Sign In</a></li>
            <li th:if="${loggedIn}" class="navbar-user">
                <span class="navbar-username">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span th:text="${username}">user</span>
                </span>
            </li>
            <li th:if="${loggedIn}">
                <form th:action="@{/logout}" method="post" style="display:inline">
                    <button type="submit" class="btn-logout">Sign Out</button>
                </form>
            </li>
        </ul>
    </nav>

    <!-- Flash messages -->
    <div class="container" th:if="${success}" style="padding-bottom:0;">
        <div class="alert alert-success">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            <span th:text="${success}"></span>
        </div>
    </div>
    <div class="container" th:if="${error}" style="padding-bottom:0;">
        <div class="alert alert-error">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            <span th:text="${error}"></span>
        </div>
    </div>

    <!-- Content -->
    <div th:replace="~{:: content}"></div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand">
                <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" width="24" height="24">
                    <rect width="32" height="32" rx="8" fill="#4f46e5"/>
                    <circle cx="16" cy="16" r="4" fill="white"/>
                </svg>
                ShopHub
            </div>
            <div class="footer-links">
                <a th:href="@{/products}">Products</a>
                <a th:href="@{/orders}">Orders</a>
                <a th:if="${isAdmin}" th:href="@{/admin}">Admin</a>
            </div>
            <div class="footer-copy">
                &copy; 2026 ShopHub. Built with Spring Boot &amp; Thymeleaf.
            </div>
        </div>
    </footer>
</body>
</html>
