<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<body>
<div th:fragment="content" class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" width="48" height="48">
                <rect width="32" height="32" rx="8" fill="#4f46e5"/>
                <path d="M8 12L16 8L24 12V20L16 24L8 20V12Z" stroke="white" stroke-width="2" fill="none"/>
                <circle cx="16" cy="16" r="3" fill="white" opacity="0.9"/>
            </svg>
            <h2>Welcome Back</h2>
            <p>Sign in to your ShopHub account</p>
        </div>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="margin-top:0.5rem;">Sign In</button>
        </form>

        <div class="text-center">
            Don't have an account? <a th:href="@{/signup}">Create one</a>
        </div>
    </div>
</div>
</body>
</html>
