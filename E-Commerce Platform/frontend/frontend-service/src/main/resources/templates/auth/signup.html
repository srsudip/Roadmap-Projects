<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<body>
<div th:fragment="content" class="auth-container">
    <div class="auth-card">
        <h2>Create Account</h2>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/signup}" method="post">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required minlength="3">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-lg">Sign Up</button>
        </form>

        <div class="text-center">
            Already have an account? <a th:href="@{/login}">Login</a>
        </div>
    </div>
</div>
</body>
</html>
