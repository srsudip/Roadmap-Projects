<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<body>
<div th:fragment="content" class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" width="48" height="48">
                <rect width="32" height="32" rx="8" fill="#4f46e5"/>
                <path d="M8 12L16 8L24 12V20L16 24L8 20V12Z" stroke="white" stroke-width="2" fill="none"/>
                <circle cx="16" cy="16" r="3" fill="white" opacity="0.9"/>
            </svg>
            <h2>Create Account</h2>
            <p>Join ShopHub and start shopping</p>
        </div>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/signup}" method="post">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" class="form-control" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Choose a username" required minlength="3">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="margin-top:0.5rem;">Create Account</button>
        </form>

        <div class="text-center">
            Already have an account? <a th:href="@{/login}">Sign in</a>
        </div>
    </div>
</div>
</body>
</html>
