<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<body>
<div th:fragment="content" class="container">
    <div class="page-header">
        <h1>My Orders</h1>
    </div>

    <!-- Empty state -->
    <div th:if="${orders == null or orders.isEmpty()}" class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <h3>No orders yet</h3>
        <p>Start shopping to see your orders here.</p>
        <a th:href="@{/products}" class="btn btn-primary">Start Shopping</a>
    </div>

    <!-- Order list -->
    <div th:unless="${orders == null or orders.isEmpty()}">
        <div class="order-card" th:each="order : ${orders}">
            <div class="order-card-header">
                <div style="display:flex; align-items:center; gap:1rem;">
                    <strong style="font-size:1rem;">Order #<span th:text="${order['id']}">1</span></strong>
                    <span class="badge" th:classappend="'badge-' + ${order['status'].toLowerCase()}" th:text="${order['status']}">PENDING</span>
                </div>
                <div style="display:flex; align-items:center; gap:1rem;">
                    <span style="color:var(--text-muted); font-size:0.85rem;" th:text="${#strings.substring(order['createdAt'], 0, 16)}">Date</span>
                    <span style="font-weight:800; font-size:1.1rem; color:var(--primary);" th:text="'€' + ${#numbers.formatDecimal(order['totalAmount'], 1, 2)}">€0.00</span>
                </div>
            </div>
            <div class="order-card-body">
                <div th:if="${order['items']}" style="font-size:0.875rem; color:var(--text-secondary); margin-bottom:0.75rem;">
                    <span th:each="item, iterStat : ${order['items']}">
                        <span th:text="${item['productName']}">Product</span>
                        <span style="color:var(--text-muted);" th:text="' x' + ${item['quantity']}">x1</span>
                        <span th:unless="${iterStat.last}"> &middot; </span>
                    </span>
                </div>
                <div th:if="${order['status'] == 'PENDING'}">
                    <form th:action="@{/orders/cancel/{orderId}(orderId=${order['id']})}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-sm btn-danger"
                                onclick="return confirm('Are you sure you want to cancel this order?')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            Cancel Order
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
