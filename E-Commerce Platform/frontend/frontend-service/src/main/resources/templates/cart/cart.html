<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<body>
<div th:fragment="content" class="container">
    <div class="page-header">
        <h1>Shopping Cart</h1>
    </div>

    <!-- Empty cart -->
    <div th:if="${cart == null or cart.items == null or cart.items.isEmpty()}" class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
        <h3>Your cart is empty</h3>
        <p>Looks like you haven't added anything yet.</p>
        <a th:href="@{/products}" class="btn btn-primary">Browse Products</a>
    </div>

    <!-- Cart with items -->
    <div th:unless="${cart == null or cart.items == null or cart.items.isEmpty()}">
        <div class="card">
            <div class="card-body" style="padding:0.5rem 1.5rem;">
                <div th:each="item : ${cart.items}" class="cart-item">
                    <div class="info" style="flex:1;">
                        <div class="name" th:text="${item['productName']}">Product</div>
                        <div class="price" th:text="'€' + ${#numbers.formatDecimal(item['price'], 1, 2)}">€0.00</div>
                    </div>
                    <div class="qty-controls">
                        <form th:action="@{/cart/update/{productId}(productId=${item['productId']})}" method="post" style="display:flex; align-items:center; gap:0.25rem;">
                            <input type="hidden" name="quantity" th:value="${item['quantity'] - 1}">
                            <button type="submit" class="btn btn-sm btn-secondary" style="width:32px; height:32px; padding:0; font-size:1.1rem;">&minus;</button>
                        </form>
                        <span th:text="${item['quantity']}">1</span>
                        <form th:action="@{/cart/update/{productId}(productId=${item['productId']})}" method="post" style="display:flex; align-items:center; gap:0.25rem;">
                            <input type="hidden" name="quantity" th:value="${item['quantity'] + 1}">
                            <button type="submit" class="btn btn-sm btn-secondary" style="width:32px; height:32px; padding:0; font-size:1.1rem;">&plus;</button>
                        </form>
                        <form th:action="@{/cart/remove/{productId}(productId=${item['productId']})}" method="post" style="margin-left:0.5rem;">
                            <button type="submit" class="btn btn-sm btn-ghost" style="color:var(--danger);" title="Remove">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="cart-total">
            <span class="total-label">Total</span>
            <span class="total-value" th:text="'€' + ${#numbers.formatDecimal(cart['total'], 1, 2)}">€0.00</span>
        </div>

        <div style="display:flex; gap:1rem; margin-top:1.5rem;">
            <a th:href="@{/products}" class="btn btn-outline" style="flex:0 0 auto;">Continue Shopping</a>
            <a th:href="@{/checkout}" class="btn btn-primary btn-lg" style="flex:1;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                Proceed to Checkout
            </a>
        </div>
    </div>
</div>
</body>
</html>
